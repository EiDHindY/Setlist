<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen Party Icons (Batch 4)</title>
    <style>
        body {
            background-color: #002b36;
            color: #93a1a1;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            gap: 40px;
        }

        h2 {
            color: #fdf6e3;
            text-align: center;
            font-weight: 300;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .icon-container {
            width: 140px;
            height: 140px;
            background-color: rgba(7, 54, 66, 0.7);
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
        }

        svg {
            width: 70px;
            height: 70px;
            overflow: visible;
        }

        /* ====== Variation 10: Crowd Jump ====== */
        .var10 .heads { fill: #586e75; transition: all 0.3s; }
        .var10 .main-note { fill: #586e75; transition: all 0.3s; transform-origin: center; }

        .icon-container:hover .var10 .main-note { fill: #d33682; animation: noteFloat 1.0s infinite alternate cubic-bezier(0.45, 0, 0.55, 1); }
        .icon-container:hover .var10 .h1 { fill: #2aa198; animation: headJump 0.4s infinite alternate 0.0s; }
        .icon-container:hover .var10 .h2 { fill: #2aa198; animation: headJump 0.4s infinite alternate 0.1s; }
        .icon-container:hover .var10 .h3 { fill: #2aa198; animation: headJump 0.4s infinite alternate 0.2s; }

        @keyframes noteFloat { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-10px) scale(1.1); } }
        @keyframes headJump { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }

        /* ====== Variation 11: Radio Signal Tower ====== */
        .var11 .tower { stroke: #586e75; stroke-width: 4; fill: none; transition: stroke 0.3s; }
        .var11 .signal { stroke: #586e75; stroke-width: 4; fill: none; opacity: 0; }

        .icon-container:hover .var11 .tower { stroke: #fdf6e3; }
        .icon-container:hover .var11 .s1 { animation: signalFade 1s infinite 0.1s; stroke: #2aa198; }
        .icon-container:hover .var11 .s2 { animation: signalFade 1s infinite 0.3s; stroke: #d33682; }
        .icon-container:hover .var11 .s3 { animation: signalFade 1s infinite 0.5s; stroke: #2aa198; }

        @keyframes signalFade { 0% { opacity: 0; transform: scale(0.8); } 50% { opacity: 1; } 100% { opacity: 0; transform: scale(1.5); } }

        /* ====== Variation 12: Shared Pulse Heart ====== */
        .var12 .heart { fill: #586e75; transition: all 0.3s; transform-origin: center; }
        .var12 .bar { fill: #002b36; transform-origin: center; transition: all 0.2s; }

        .icon-container:hover .var12 .heart { fill: #d33682; animation: heartThump 0.6s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .icon-container:hover .var12 .b1 { fill: #fdf6e3; animation: barGrow 0.3s infinite alternate; }
        .icon-container:hover .var12 .b2 { fill: #fdf6e3; animation: barGrow 0.3s infinite alternate 0.1s; }

        @keyframes heartThump { 0% { transform: scale(1); } 100% { transform: scale(1.2); filter: drop-shadow(0 0 12px #d33682); } }
        @keyframes barGrow { 0% { transform: scaleY(0.4); } 100% { transform: scaleY(1.4); } }

    </style>
</head>
<body>

    <p style="text-align: center; color: #586e75; font-size: 0.9rem; max-width: 400px; margin-top: -20px;">
        Batch 4: Social Energy & Shared Vibe.
    </p>

    <!-- Variation 10 -->
    <div>
        <h2>10. The Crowd Jump<br><small style="color:#586e75; font-size: 0.8rem;">A group bouncing together in perfect time</small></h2>
        <div class="icon-container">
            <div class="var10">
                <svg viewBox="0 0 100 100">
                    <!-- Note floating above -->
                    <path class="main-note" d="M45 40 A8 6 0 1 0 53 34 L53 15 L65 18 L65 23 L56 20 L56 40 Z" />
                    <!-- Jumping People (Heads) -->
                    <circle class="heads h1" cx="30" cy="70" r="6" />
                    <circle class="heads h2" cx="50" cy="70" r="6" />
                    <circle class="heads h3" cx="70" cy="70" r="6" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Variation 11 -->
    <div>
        <h2>11. Live Cast Tower<br><small style="color:#586e75; font-size: 0.8rem;">Broadcasting your session across the platform</small></h2>
        <div class="icon-container">
            <div class="var11">
                <svg viewBox="0 0 100 100">
                    <!-- Tower Base -->
                    <path class="tower" d="M50 80 L50 20 M30 80 L50 40 L70 80" />
                    <!-- Signal Waves -->
                    <circle class="signal s1" cx="50" cy="20" r="5" />
                    <circle class="signal s2" cx="50" cy="20" r="15" />
                    <circle class="signal s3" cx="50" cy="20" r="25" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Variation 12 -->
    <div>
        <h2>12. Shared Pulse Heart<br><small style="color:#586e75; font-size: 0.8rem;">An anatomical heart that beats to the music frequency</small></h2>
        <div class="icon-container">
            <div class="var12">
                <svg viewBox="0 0 100 100">
                    <!-- Heart Shape -->
                    <path class="heart" d="M50 85 C50 85 15 65 15 40 C15 20 35 15 50 30 C65 15 85 20 85 40 C85 65 50 85 50 85 Z" />
                    <!-- Equalizer bars inside -->
                    <rect class="bar b1" x="42" y="40" width="6" height="20" rx="3" />
                    <rect class="bar b2" x="52" y="40" width="6" height="20" rx="3" />
                </svg>
            </div>
        </div>
    </div>

</body>
</html>
