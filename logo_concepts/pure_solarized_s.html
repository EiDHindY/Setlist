<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlist - Pure Solarized Geometric</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap');
  
  :root {
    --sol-base03: #002b36;
    --sol-base02: #073642;
    --sol-base01: #586e75;
    --sol-base00: #657b83;
    --sol-base0:  #839496;
    --sol-base1:  #93a1a1;
    --sol-base2:  #eee8d5;
    --sol-base3:  #fdf6e3;
    --sol-cyan:   #2aa198;
    --sol-yellow: #b58900;
  }

  body {
    margin: 0;
    height: 100vh;
    background-color: var(--sol-base03);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .logo-container {
    position: relative;
    width: 300px;
    height: 350px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .svg-mark {
    width: 140px;
    height: 140px;
    margin-bottom: 30px;
    overflow: visible;
  }

  .geometric-s {
    fill: none;
    stroke: var(--sol-cyan);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: drawPath 1.8s cubic-bezier(0.65, 0, 0.35, 1) forwards 0.2s;
  }

  .note-head {
    fill: var(--sol-cyan);
    transform-origin: 30px 80px;
    opacity: 0;
    transform: scale(0.5) rotate(-40deg);
    animation: popHead 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 1.7s;
  }

  .brand-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 24px;
    color: var(--sol-base1);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 2.0s;
    padding-left: 24px; /* Optical balance for huge letter spacing */
  }

  @keyframes drawPath {
    to { stroke-dashoffset: 0; }
  }

  @keyframes popHead {
    to { opacity: 1; transform: scale(1) rotate(-20deg); }
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

</style>
</head>
<body>

<div class="logo-container">
  <svg class="svg-mark" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Pure Mathematical Geometric 'S' using perfect circular SVG Arcs matching Golden typographic proportions -->
    <path class="geometric-s" d="M 30 80 
             A 20 20 0 0 0 50 100 
             A 20 20 0 0 0 70 80 
             A 20 20 0 0 0 50 60 
             A 16 16 0 0 1 34 44 
             A 16 16 0 0 1 50 28 
             A 16 16 0 0 1 66 44" />
    
    <!-- Music Note Terminal -->
    <ellipse cx="30" cy="80" rx="9" ry="6" class="note-head" />
  </svg>

  <div class="brand-text">SETLIST</div>
</div>

</body>
</html>
