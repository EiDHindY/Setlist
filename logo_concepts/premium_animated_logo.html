<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlist - Premium Animated Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&display=swap');
  
  :root {
    --bg-color: #030305;
    --primary-glow: rgba(142, 197, 252, 0.15);
    --accent-glow: rgba(224, 195, 252, 0.15);
  }

  body {
    margin: 0;
    height: 100vh;
    background-color: var(--bg-color);
    background-image: 
      radial-gradient(circle at 15% 50%, var(--primary-glow), transparent 50%),
      radial-gradient(circle at 85% 30%, var(--accent-glow), transparent 50%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Outfit', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  .logo-container {
    position: relative;
    width: 250px;
    height: 250px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .logo-backdrop {
    position: absolute;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
    box-shadow: 0 0 40px rgba(224, 195, 252, 0.1);
    animation: breathe 4s ease-in-out infinite alternate;
  }

  .logo-svg {
    width: 100%;
    height: 100%;
    z-index: 2;
    filter: drop-shadow(0 0 10px rgba(224, 195, 252, 0.3));
  }

  .gradient-stroke {
    stroke: url(#premium-gradient);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  .animated-draw {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: draw 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  .animated-fade {
    opacity: 0;
    fill: url(#premium-gradient);
    animation: fadeIn 1.5s ease-out forwards;
  }

  .float-slow {
    animation: float 6s ease-in-out infinite;
  }

  .pulse-slow {
    animation: pulse 3s ease-in-out infinite alternate;
  }

  @keyframes draw {
    100% { stroke-dashoffset: 0; }
  }

  @keyframes fadeIn {
    100% { opacity: 0.9; }
  }

  @keyframes breathe {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.15); opacity: 1; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-5px); }
  }

  @keyframes pulse {
    0% { filter: drop-shadow(0 0 8px rgba(224, 195, 252, 0.2)); }
    100% { filter: drop-shadow(0 0 20px rgba(224, 195, 252, 0.6)); }
  }

  .brand-title {
    margin-top: 30px;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 16px;
    text-transform: uppercase;
    background: linear-gradient(120deg, #E0C3FC 0%, #8EC5FC 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    animation: slideUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 2s;
  }

  .brand-subtitle {
    margin-top: 12px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 8px;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    opacity: 0;
    animation: slideUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 2.4s;
  }

  @keyframes slideUp {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="logo-container float-slow">
  <div class="logo-backdrop"></div>
  <svg class="logo-svg pulse-slow" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#E0C3FC" />
        <stop offset="50%" stop-color="#ffffff" />
        <stop offset="100%" stop-color="#8EC5FC" />
      </linearGradient>
    </defs>

    <path class="gradient-stroke animated-draw" style="stroke-width: 2;" d="M50 85 C 20 60, 5 40, 15 20 C 22 10, 38 10, 50 25 C 62 10, 78 10, 85 20 C 95 40, 80 60, 50 85 Z" />

    <!-- Gaming Nodes -->
    <circle cx="28" cy="35" r="1.5" class="animated-fade" style="animation-delay: 1.5s" />
    <circle cx="28" cy="27" r="1" class="animated-fade" style="animation-delay: 1.6s" />
    <path class="gradient-stroke animated-draw" style="animation-delay: 1.6s; animation-duration: 0.5s; stroke-dasharray: 20; stroke-dashoffset: 20;" d="M 28 29 V 33" />
    <circle cx="28" cy="43" r="1" class="animated-fade" style="animation-delay: 1.7s" />
    <path class="gradient-stroke animated-draw" style="animation-delay: 1.7s; animation-duration: 0.5s; stroke-dasharray: 20; stroke-dashoffset: 20;" d="M 28 37 V 41" />
    <circle cx="20" cy="35" r="1" class="animated-fade" style="animation-delay: 1.8s" />
    <path class="gradient-stroke animated-draw" style="animation-delay: 1.8s; animation-duration: 0.5s; stroke-dasharray: 20; stroke-dashoffset: 20;" d="M 22 35 H 26" />
    <circle cx="36" cy="35" r="1" class="animated-fade" style="animation-delay: 1.9s" />
    <path class="gradient-stroke animated-draw" style="animation-delay: 1.9s; animation-duration: 0.5s; stroke-dasharray: 20; stroke-dashoffset: 20;" d="M 30 35 H 34" />

    <!-- Music Stem -->
    <path class="gradient-stroke animated-draw" style="animation-delay: 1s; stroke-width: 1.5;" d="M 72 45 V 18 C 80 18, 85 24, 85 32 C 85 36, 82 40, 78 40" />
    <circle cx="68" cy="45" r="3" class="animated-fade" style="animation-delay: 2.2s" />
    <path class="gradient-stroke animated-draw" style="animation-delay: 1.5s; opacity: 0.5;" d="M 83 25 C 88 30, 88 40, 80 45" />

    <!-- Connection -->
    <path class="gradient-stroke animated-draw" style="animation-delay: 2s; stroke-width: 0.5; stroke-dasharray: 40; stroke-dashoffset: 40; opacity: 0.3;" d="M 38 35 Q 50 35, 62 40" />

  </svg>
</div>

<div class="brand-title">SETLIST</div>
<div class="brand-subtitle">Music &middot; Love &middot; Gaming</div>

</body>
</html>
