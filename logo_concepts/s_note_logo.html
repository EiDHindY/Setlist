<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlist - S Note Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&family=Playfair+Display:ital,wght@1,400&display=swap');
  
  body {
    margin: 0;
    height: 100vh;
    background-color: #030303;
    background-image: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05), transparent 60%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: #ffffff;
  }

  .logo-container {
    position: relative;
    width: 250px;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .logo-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .staff-line {
    stroke: rgba(255, 255, 255, 0.06);
    stroke-width: 1;
    fill: none;
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawStaff 2.5s ease-in-out forwards;
  }

  .s-curve {
    fill: none;
    stroke: url(#gold-metallic);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.3));
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    animation: drawS 2s cubic-bezier(0.4, 0, 0.2, 1) forwards 1s;
  }

  .note-head {
    fill: url(#gold-metallic);
    transform-origin: 28px 82px;
    opacity: 0;
    transform: scale(0.5) rotate(-20deg);
    animation: popNote 0.8s cubic-bezier(0.3, 1.5, 0.6, 1) forwards 0.5s;
    filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
  }

  .brand-text {
    margin-top: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 38px;
    font-weight: 200;
    letter-spacing: 18px;
    text-transform: uppercase;
    color: transparent;
    background: linear-gradient(to right, #d4af37, #fdfbc4, #d4af37);
    -webkit-background-clip: text;
    background-clip: text;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeText 2s ease-out forwards 2s;
  }

  .brand-sub {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 6px;
    margin-top: 12px;
    opacity: 0;
    animation: fadeText 2s ease-out forwards 2.5s;
  }

  .anim-float {
    animation: float 6s ease-in-out infinite 2.5s;
  }

  @keyframes drawStaff {
    to { stroke-dashoffset: 0; }
  }

  @keyframes popNote {
    to { opacity: 1; transform: scale(1) rotate(-15deg); }
  }

  @keyframes drawS {
    to { stroke-dashoffset: 0; }
  }

  @keyframes fadeText {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); filter: drop-shadow(0 15px 20px rgba(212, 175, 55, 0.2)); }
  }
</style>
</head>
<body>

<div class="logo-container anim-float">
  <svg class="logo-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gold-metallic" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ab8426" />
        <stop offset="30%" stop-color="#d4af37" />
        <stop offset="50%" stop-color="#fdfbc4" />
        <stop offset="70%" stop-color="#d4af37" />
        <stop offset="100%" stop-color="#ab8426" />
      </linearGradient>
    </defs>

    <path class="staff-line" d="M -20 30 Q 50 25 120 30" style="animation-delay: 0s;" />
    <path class="staff-line" d="M -20 45 Q 50 40 120 45" style="animation-delay: 0.15s;" />
    <path class="staff-line" d="M -20 60 Q 50 55 120 60" style="animation-delay: 0.3s;" />
    <path class="staff-line" d="M -20 75 Q 50 70 120 75" style="animation-delay: 0.45s;" />
    <path class="staff-line" d="M -20 90 Q 50 85 120 90" style="animation-delay: 0.6s;" />

    <ellipse cx="28" cy="82" rx="9" ry="6.5" class="note-head" />

    <path class="s-curve" d="M 36 80 
             C 80 85, 80 45, 50 50 
             C 15 55, 20 20, 55 20 
             C 75 20, 85 35, 75 45" />

  </svg>
</div>

<div class="brand-text">SETLIST</div>
<div class="brand-sub">Premium Audio</div>

</body>
</html>
