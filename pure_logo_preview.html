<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETLIST - Pure Logo Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --base03: #002b36;
            --base02: #073642;
            --base01: #586e75;
            --base1: #93a1a1;
            --base3: #fdf6e3;
            --cyan: #2aa198;
        }

        body {
            background-color: var(--base03);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }

        .logo-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 280px;
            height: 280px;
            overflow: visible;
            filter: drop-shadow(0 0 30px rgba(42, 161, 152, 0.15));
        }

        .staff-line {
            fill: none;
            stroke: var(--base01);
            stroke-width: 0.5;
            opacity: 0.5;
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            animation: drawStaff 2.5s ease-in-out forwards;
        }

        .geometric-s {
            fill: none;
            stroke: var(--base3);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 240;
            stroke-dashoffset: 240;
            animation: drawS 3s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.8s;
            filter: drop-shadow(0 4px 12px rgba(253, 246, 227, 0.25));
        }

        .geometric-s-ghost {
            fill: none;
            stroke: var(--cyan);
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 240;
            stroke-dashoffset: 240;
            opacity: 0.5;
            transform: translate(-3px, 3px);
            animation: drawS 3s cubic-bezier(0.4, 0, 0.2, 1) forwards 1.1s;
        }

        .note-head {
            fill: var(--base3);
            transform-origin: 30px 80px;
            opacity: 0;
            transform: scale(0) rotate(-30deg);
            animation: popNote 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 3.2s;
        }

        .note-head-ghost {
            fill: var(--cyan);
            transform-origin: 30px 80px;
            opacity: 0;
            transform: scale(0) rotate(-30deg) translate(-3px, 3px);
            animation: popNote 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 3.5s;
        }

        .brand-text {
            color: var(--base3);
            font-size: 32px;
            letter-spacing: 22px;
            font-weight: 400;
            margin-top: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInText 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 2.5s;
            padding-left: 22px; /* Centering fix for letter-spacing */
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        @keyframes drawStaff {
            to { stroke-dashoffset: 0; }
        }

        @keyframes drawS {
            to { stroke-dashoffset: 0; }
        }

        @keyframes popNote {
            to { 
                opacity: 1; 
                transform: scale(1) rotate(-15deg); 
            }
        }

        @keyframes fadeInText {
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* Refresh Button for testing */
        .refresh {
            position: absolute;
            bottom: 40px;
            color: var(--base01);
            font-family: sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            border: 1px solid var(--base01);
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .refresh:hover {
            color: var(--base3);
            border-color: var(--base3);
        }
    </style>
</head>
<body onclick="location.reload()">

    <div class="logo-container">
        <svg viewBox="0 0 100 120">
            <!-- Staff Lines -->
            <path class="staff-line" d="M -40 40 Q 50 38 140 40" style="animation-delay: 0.1s;" />
            <path class="staff-line" d="M -40 60 Q 50 62 140 60" style="animation-delay: 0.3s;" />
            <path class="staff-line" d="M -40 80 Q 50 78 140 80" style="animation-delay: 0.5s;" />
            <path class="staff-line" d="M -40 100 Q 50 102 140 100" style="animation-delay: 0.7s;" />

            <!-- Logo Mark -->
            <g>
                <!-- Ghost Path -->
                <path class="geometric-s-ghost" d="M 30 80 A 20 20 0 0 0 50 100 A 20 20 0 0 0 70 80 A 20 20 0 0 0 50 60 A 16 16 0 0 1 34 44 A 16 16 0 0 1 50 28 A 16 16 0 0 1 66 44" />
                <ellipse cx="27" cy="83" rx="9" ry="6" class="note-head-ghost" />

                <!-- Main Path -->
                <path class="geometric-s" d="M 30 80 A 20 20 0 0 0 50 100 A 20 20 0 0 0 70 80 A 20 20 0 0 0 50 60 A 16 16 0 0 1 34 44 A 16 16 0 0 1 50 28 A 16 16 0 0 1 66 44" />
                <ellipse cx="30" cy="80" rx="9" ry="6" class="note-head" />
            </g>
        </svg>

        <div class="brand-text">SETLIST</div>
    </div>

    <div class="refresh" style="position: fixed; bottom: 20px;">Click anywhere to restart animation</div>

</body>
</html>
