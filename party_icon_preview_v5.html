<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen Party Icons (Batch 5)</title>
    <style>
        body {
            background-color: #002b36;
            color: #93a1a1;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            gap: 40px;
        }

        h2 {
            color: #fdf6e3;
            text-align: center;
            font-weight: 300;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .icon-container {
            width: 140px;
            height: 140px;
            background-color: rgba(7, 54, 66, 0.7);
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
        }

        svg {
            width: 70px;
            height: 70px;
            overflow: visible;
        }

        /* ====== Variation 13: The Group Waveform ====== */
        .var13 .wave {
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            transition: all 0.3s;
        }
        .var13 .w1 { stroke: #586e75; transform: translateY(-5px); }
        .var13 .w2 { stroke: #586e75; transform: translateY(5px); }
        .var13 .w3 { stroke: #586e75; transform: scale(0.8); }

        .icon-container:hover .var13 .w1 { stroke: #2aa198; animation: waveMove 0.8s infinite alternate ease-in-out; }
        .icon-container:hover .var13 .w2 { stroke: #d33682; animation: waveMove 0.8s infinite alternate-reverse ease-in-out; }
        .icon-container:hover .var13 .w3 { stroke: #fdf6e3; stroke-width: 6; animation: wavePulse 0.4s infinite alternate; }

        @keyframes waveMove { 0% { d: path("M10 50 Q30 20 50 50 T90 50"); } 100% { d: path("M10 50 Q30 80 50 50 T90 50"); } }
        @keyframes wavePulse { 0% { transform: scale(0.9); opacity: 0.5; } 100% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 10px #fdf6e3); } }

        /* ====== Variation 14: User Constellation ====== */
        .var14 .star { fill: #586e75; transition: all 0.3s; }
        .var14 .con-line { stroke: #586e75; stroke-width: 2; opacity: 0.2; stroke-dasharray: 100; stroke-dashoffset: 100; transition: all 0.5s; }

        .icon-container:hover .var14 .star { fill: #2aa198; animation: starTwinkle 1s infinite alternate; }
        .icon-container:hover .var14 .s-mid { fill: #d33682; transform: scale(1.3); }
        .icon-container:hover .var14 .con-line { opacity: 0.8; stroke-dashoffset: 0; stroke: #fdf6e3; }

        @keyframes starTwinkle { 0% { opacity: 0.5; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }

        /* ====== Variation 15: The Sound Sphere ====== */
        .var15 .ring {
            stroke: #586e75;
            stroke-width: 3;
            fill: none;
            transition: all 0.3s;
            transform-origin: center;
        }
        .var15 .dot { fill: #586e75; transition: all 0.3s; }

        .icon-container:hover .var15 .r1 { stroke: #2aa198; animation: rotateRing 2s infinite linear; }
        .icon-container:hover .var15 .r2 { stroke: #d33682; animation: rotateRing 3s infinite linear reverse; }
        .icon-container:hover .var15 .dot { fill: #fdf6e3; transform: scale(1.5); filter: drop-shadow(0 0 8px #fdf6e3); }

        @keyframes rotateRing { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <p style="text-align: center; color: #586e75; font-size: 0.9rem; max-width: 400px; margin-top: -20px;">
        Batch 5: Abstract Sync & Cosmic Patterns.
    </p>

    <!-- Variation 13 -->
    <div>
        <h2>13. The Group Waveform<br><small style="color:#586e75; font-size: 0.8rem;">Independent waves merging into a powerful central frequency</small></h2>
        <div class="icon-container">
            <div class="var13">
                <svg viewBox="0 0 100 100">
                    <path class="wave w1" d="M10 50 Q30 50 50 50 T90 50" />
                    <path class="wave w2" d="M10 50 Q30 50 50 50 T90 50" />
                    <path class="wave w3" d="M10 50 Q30 50 50 50 T90 50" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Variation 14 -->
    <div>
        <h2>14. User Constellation<br><small style="color:#586e75; font-size: 0.8rem;">A map of listeners forming a unique musical pattern</small></h2>
        <div class="icon-container">
            <div class="var14">
                <svg viewBox="0 0 100 100">
                    <line class="con-line" x1="20" y1="20" x2="50" y2="50" />
                    <line class="con-line" x1="80" y1="20" x2="50" y2="50" />
                    <line class="con-line" x1="20" y1="80" x2="50" y2="50" />
                    <line class="con-line" x1="80" y1="80" x2="50" y2="50" />
                    <circle class="star" cx="20" cy="20" r="4" />
                    <circle class="star" cx="80" cy="20" r="4" />
                    <circle class="star" cx="20" cy="80" r="4" />
                    <circle class="star" cx="80" cy="80" r="4" />
                    <circle class="star s-mid" cx="50" cy="50" r="6" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Variation 15 -->
    <div>
        <h2>15. The Sound Sphere<br><small style="color:#586e75; font-size: 0.8rem;">An orbital music core with spinning planetary rings</small></h2>
        <div class="icon-container">
            <div class="var15">
                <svg viewBox="0 0 100 100">
                    <circle class="ring r1" cx="50" cy="50" r="30" />
                    <circle class="ring r2" cx="50" cy="50" r="20" />
                    <circle class="dot" cx="50" cy="50" r="8" />
                    <!-- Orbital nodes -->
                    <circle cx="80" cy="50" r="3" fill="#2aa198" style="opacity: 0.5" />
                    <circle cx="20" cy="50" r="3" fill="#d33682" style="opacity: 0.5" />
                </svg>
            </div>
        </div>
    </div>

</body>
</html>
