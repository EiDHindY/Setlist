<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlist - Solarized Premium</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&family=Playfair+Display:ital,wght@1,400&display=swap');
  
  :root {
    --sol-base03: #002b36;
    --sol-base02: #073642;
    --sol-base01: #586e75;
    --sol-base00: #657b83;
    --sol-base0:  #839496;
    --sol-base1:  #93a1a1;
    --sol-base2:  #eee8d5;
    --sol-base3:  #fdf6e3;
    --sol-yellow: #b58900;
    --sol-orange: #cb4b16;
    --sol-cyan:   #2aa198;
    --sol-blue:   #268bd2;
  }

  body {
    margin: 0;
    height: 100vh;
    background-color: var(--sol-base03);
    background-image: radial-gradient(circle at 50% 50%, var(--sol-base02), var(--sol-base03) 70%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: var(--sol-base3);
  }

  .logo-wrapper {
    position: relative;
    width: 250px;
    height: 350px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .logo-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .staff-line {
    stroke: var(--sol-base01);
    stroke-width: 1;
    fill: none;
    opacity: 0.3;
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: wipeStaff 2.5s ease-in-out forwards;
  }

  /* Outer glowing curve */
  .s-curve-glow {
    fill: none;
    stroke: url(#solarized-grad);
    stroke-width: 7;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 14px rgba(42, 161, 152, 0.4));
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawGlow 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.8s;
  }

  /* Ultra-sharp inner core */
  .s-curve-core {
    fill: none;
    stroke: var(--sol-base3);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawCore 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.9s;
    filter: drop-shadow(0 0 4px rgba(253, 246, 227, 0.8));
  }

  .note-head {
    fill: url(#solarized-grad);
    transform-origin: 32px 122px;
    opacity: 0;
    transform: scale(0.5) rotate(-20deg);
    animation: popNote 0.8s cubic-bezier(0.3, 1.5, 0.6, 1) forwards 0.3s;
    filter: drop-shadow(0 0 10px rgba(42, 161, 152, 0.5));
  }

  .note-head-core {
    fill: var(--sol-base3);
    transform-origin: 32px 122px;
    opacity: 0;
    transform: scale(0.5) rotate(-20deg);
    animation: popNote 0.8s cubic-bezier(0.3, 1.5, 0.6, 1) forwards 0.4s;
  }

  .brand-container {
    text-align: center;
    position: relative;
    top: -20px;
  }

  .brand-text {
    font-family: 'Outfit', sans-serif;
    font-size: 42px;
    font-weight: 200;
    letter-spacing: 22px;
    text-transform: uppercase;
    color: var(--sol-base3);
    text-shadow: 0 4px 15px rgba(253, 246, 227, 0.2);
    -webkit-font-smoothing: antialiased;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeText 2s ease-out forwards 1.8s;
    padding-left: 22px; /* Balance the letter spacing */
  }

  .brand-sub {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--sol-base1);
    letter-spacing: 8px;
    margin-top: 15px;
    opacity: 0;
    animation: fadeText 2s ease-out forwards 2.3s;
    padding-left: 8px;
  }

  .anim-float {
    animation: premiumFloat 8s ease-in-out infinite 3s;
  }

  @keyframes wipeStaff {
    to { stroke-dashoffset: 0; }
  }

  @keyframes popNote {
    to { opacity: 1; transform: scale(1) rotate(-15deg); }
  }

  @keyframes drawGlow {
    to { stroke-dashoffset: 0; }
  }

  @keyframes drawCore {
    to { stroke-dashoffset: 0; }
  }

  @keyframes fadeText {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes premiumFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); filter: drop-shadow(0 15px 30px rgba(0, 43, 54, 0.6)); }
  }
</style>
</head>
<body>

<div class="logo-wrapper anim-float">
  <svg class="logo-svg" viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Premium Solarized Gradient (Cyan to Blue) -->
      <linearGradient id="solarized-grad" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#2aa198" /> <!-- Solarized Cyan -->
        <stop offset="50%" stop-color="#268bd2" /> <!-- Solarized Blue -->
        <stop offset="100%" stop-color="#2aa198" /> <!-- Solarized Cyan -->
      </linearGradient>
    </defs>

    <!-- Staff lines beautifully spaced -->
    <path class="staff-line" d="M -20 40 Q 50 35 120 40" style="animation-delay: 0s;" />
    <path class="staff-line" d="M -20 60 Q 50 55 120 60" style="animation-delay: 0.1s;" />
    <path class="staff-line" d="M -20 80 Q 50 75 120 80" style="animation-delay: 0.2s;" />
    <path class="staff-line" d="M -20 100 Q 50 95 120 100" style="animation-delay: 0.3s;" />
    <path class="staff-line" d="M -20 120 Q 50 115 120 120" style="animation-delay: 0.4s;" />

    <!-- Music Note Head -->
    <ellipse cx="32" cy="122" rx="10" ry="7" class="note-head" />
    <ellipse cx="32" cy="122" rx="3" ry="2" class="note-head-core" />
    
    <!-- Outer Glow Curve -->
    <path class="s-curve-glow" d="M 37 120 C 85 130, 90 80, 50 80 C 15 80, 15 30, 50 30 C 75 30, 80 50, 70 60" />
    <!-- Inner Core Curve -->
    <path class="s-curve-core" d="M 37 120 C 85 130, 90 80, 50 80 C 15 80, 15 30, 50 30 C 75 30, 80 50, 70 60" />

  </svg>
</div>

<div class="brand-container">
  <div class="brand-text">SETLIST</div>
  <div class="brand-sub">Premium Audio</div>
</div>

</body>
</html>
